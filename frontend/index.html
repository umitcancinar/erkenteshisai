<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erken Teşhis AI</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chatbot.css">
</head>
<body class="dark-mode">
    <header class="glass-panel">
        <div class="nav-container">
            <div class="nav-left">
                <a href="#landing" class="nav-link" data-i18n="nav_home">Ana Sayfa</a>
                <a href="#how-it-works-scroll" class="nav-link" data-i18n="nav_how">Nasıl Çalışır</a>
            </div>
            <div class="nav-right">
                <button id="lang-toggle" class="toggle-btn" title="Dili Değiştir/Change Language">
                    <i class='bx bx-globe'></i>
                    <span id="current-lang" style="font-size: 12px; margin-left: 4px; font-weight: 600;">TR</span>
                </button>
                <button id="theme-toggle" class="toggle-btn" title="Tema Değiştir/Toggle Theme">
                    <i class='bx bx-moon' id="theme-icon"></i>
                </button>
                <span id="header-user-welcome" class="hidden" style="margin-right: 15px; font-weight: 500; font-size: 14px;"></span>
                <a href="#login" class="nav-link" data-i18n="nav_login" id="header-login">Giriş Yap</a>
                <a href="#register" class="nav-link" data-i18n="nav_register" id="header-register" style="font-weight: 600;">Kayıt Ol</a>
            </div>
        </div>
    </header>
    <div id="app">
        <!-- Sidebar Navigation (Hidden on Login) -->
        <nav id="sidebar" class="hidden glass-panel">
            <div class="logo">
                <i class='bx bx-pulse'></i>
                <h2>ErkenTeşhis<span>AI</span></h2>
            </div>
            <ul class="nav-links">
                <li><a href="#dashboard" class="active" data-link data-i18n="nav_dashboard"><i class='bx bx-home-alt'></i> Gösterge Paneli</a></li>
                <li><a href="#data-entry" data-link data-i18n="nav_data"><i class='bx bx-data'></i> Veriler</a></li>
                <li><a href="#chat" data-link data-i18n="nav_chat"><i class='bx bx-message-square-dots'></i> Sağlık Danışmanı</a></li>
                <li><a href="#analysis" data-link data-i18n="nav_analysis"><i class='bx bx-scan'></i> Görsel Analiz</a></li>
                <li><a href="#reports" data-link data-i18n="nav_reports"><i class='bx bx-file-blank'></i> Raporlar</a></li>
                <li><a href="#face-id" data-link data-i18n="nav_face_id"><i class='bx bx-face'></i> Face ID</a></li>
                <li><a href="#profile" data-link data-i18n="nav_profile"><i class='bx bx-user-circle'></i> Kullanıcı Bilgileri</a></li>
                <li id="admin-nav" class="hidden"><a href="#admin" data-link data-i18n="nav_admin"><i class='bx bx-shield-quarter'></i> Yönetim Paneli</a></li>
            </ul>
            <div class="nav-footer">
                <div class="user-info">
                    <div class="avatar"><i class='bx bx-user'></i></div>
                    <span id="nav-username">Kullanıcı</span>
                </div>
                <button id="logout-btn" class="btn-icon"><i class='bx bx-log-out'></i></button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Loading Overlay -->
            <div id="loader" class="hidden">
                <div class="spinner"></div>
            </div>

            <!-- Views Container -->
            <div id="view-container">
                <!-- Views will be injected here via JavaScript -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
