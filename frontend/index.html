<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erken Teşhis AI</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation (Hidden on Login) -->
        <nav id="sidebar" class="hidden glass-panel">
            <div class="logo">
                <i class='bx bx-pulse'></i>
                <h2>ErkenTeşhis<span>AI</span></h2>
            </div>
            <ul class="nav-links">
                <li><a href="#dashboard" class="active" data-link><i class='bx bx-home-alt'></i> Gösterge Paneli</a></li>
                <li><a href="#chat" data-link><i class='bx bx-message-square-dots'></i> Sağlık Danışmanı</a></li>
                <li><a href="#analysis" data-link><i class='bx bx-scan'></i> Görsel Analiz</a></li>
                <li><a href="#reports" data-link><i class='bx bx-file-blank'></i> Raporlar</a></li>
                <li id="admin-nav" class="hidden"><a href="#admin" data-link><i class='bx bx-shield-quarter'></i> Yönetim Paneli</a></li>
            </ul>
            <div class="nav-footer">
                <div class="user-info">
                    <div class="avatar"><i class='bx bx-user'></i></div>
                    <span id="nav-username">Kullanıcı</span>
                </div>
                <button id="logout-btn" class="btn-icon"><i class='bx bx-log-out'></i></button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Loading Overlay -->
            <div id="loader" class="hidden">
                <div class="spinner"></div>
            </div>

            <!-- Views Container -->
            <div id="view-container">
                <!-- Views will be injected here via JavaScript -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
